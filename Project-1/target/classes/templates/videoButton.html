<!DOCTYPE html>
<html xmlns:th = "http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Video Button</title>
</head>

<!--Video Button Page with the button to start playing the user's scheduled-->
<body>
    <h1>Video Player</h1>
    <p>This is the button that will let the user begin playing their scheduled video.</p>

    <form th:action="@{/player}" method="get">
        <button type="submit">Play</button>
    </form>

    <p>Back to <a th:href="@{/home}">Homepage</a></p>
</body>
