<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><title>Schedule Form</title></head>
<body>
    
  <h1 th:text="${form.id == null ? 'Add Video' : 'Edit Video'}"></h1>

  <div th:if="${error}">
    <p style="color:red;" th:text="${error}"></p>
  </div>

  <form th:action="${form.id == null} ? @{/schedule} : @{'/schedule/' + ${form.id}}" method="post" th:object="${form}">
    <div>
      <label>Title</label>
      <input th:field="*{title}" />
    </div>


    <div>
      <label>YouTube URL</label>
      <input th:field="*{videoUrl}" />
    </div>


    <div>
      <label>Start</label>
      <input type="datetime-local" th:field="*{startTime}" />
    </div>


    <div>
      <label>End</label>
      <input type="datetime-local" th:field="*{endTime}" />
    </div>

    
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    <button type="submit">Save</button>
    <a th:href="@{/schedule}">Cancel</a>
  </form>
</body>
</html>
