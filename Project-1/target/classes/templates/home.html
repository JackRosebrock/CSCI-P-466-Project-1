<!DOCTYPE html>
<html xmlns:th = "http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Homepage</title>
</head>

<!--Homepage with options to open their schedule, video player or logout-->
<body>
    <h1>Homepage</h1>
    <p>Logged in as: <b th:text="${username}"></b></p>

    <p>Create your schedule <a th:href="@{/schedule}">here!</a></p>
    <p>Open your video player <a th:href="@{/videoButton}">here!</a></p>

    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="_csrf" th:value="${_csrf.token}">
        <button type="submit">Log Out</button>
    </form>
</body>
