<!DOCTYPE html>
<html xmlns:th = "http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Homepage</title>
</head>

<!--Homepage with options to open their schedule, video player or logout-->
<body>
    <h1>Homepage</h1>
    <p>Logged in as: <b th:text="${username}"></b></p>
    <p>Open your video player <a th:href="@{/videoButton}">here!</a></p>

    <!--Display's the user's schedule (empty or otherwise)-->
    <h2>Your schedule</h2>
    <table border="2" cellpadding="6">
        <thead>
            <tr><th>Title</th><th>URL</th><th>Start</th><th>End</th></tr>
        </thead>

        <tbody>
            <tr th:if="${#lists.isEmpty(schedules)}">
                <td colspan="4">No videos are currently scheduled.</td>
            </tr>

            <tr th:each="s : ${schedules}">
                <td th:text = "${s.title}"></td>
                <td><a th:href="${s.videoUrl}" th:text="${s.videoUrl}"></a></td>
                <td th:text="${s.startTime}"></td>
                <td th:text="${s.endTime}"></td>
            </tr>
        </tbody>
    </table>

    <!--Link to the schedule builder-->
    <p>Manage your schedule <a th:href="@{/schedule}">here!</a></p>

    <!--Logout button-->
    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="_csrf.parameterName" th:value="${_csrf.token}">
        <button type="submit">Log Out</button>
    </form>
</body>
